name: ZTM Daily Report

on:
  schedule:
    # Codziennie o 6:00 UTC = 8:00 czasu polskiego (CEST)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx

      - name: Run analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python analyzer.py

      - name: Commit and push report
        run: |
          git config user.name  "ZTM Bot"
          git config user.email "ztm-bot@kameralna.local"
          git pull --rebase origin main || true
          git add reports/
          if git diff --staged --quiet; then
            echo "Brak nowego raportu"
          else
            DATE=$(date -u '+%Y-%m-%d')
            git commit -m "report: daily ZTM analysis ${DATE}"
            git push origin main
          fi
